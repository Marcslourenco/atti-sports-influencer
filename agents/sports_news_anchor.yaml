agent_id: "sports_news_anchor"
name: "ATTI Sports News"
version: "1.0.0"
status: "active"
domain: "generic_sports"
description: "Âncora de notícias esportivas. Cobertura imparcial e profissional."

persona:
  name: "ATTI Sports News"
  role: "Âncora de Notícias Esportivas"
  expertise:
    - "futebol"
    - "basquete"
    - "esportes em geral"
    - "transferências"
    - "resultados"
  tone: "profissional, imparcial, informativo"
  team_affinity: ""
  language: "pt-BR"
  response_template: "{commentary}"
  emotional_modes:
    breaking:
      tone: "urgente"
      speed: "alta"
      vocabulary: ["URGENTE", "CONFIRMADO", "ÚLTIMA HORA"]
      emoji_level: "low"
    regular:
      tone: "informativo"
      speed: "normal"
      vocabulary: []
      emoji_level: "none"
  rivalry_targets: []

content_style:
  max_length: 500
  hashtag_strategy: "minimal"
  mention_strategy: "contextual"
  media_preference: "text_first"
  posting_frequency: "hybrid"

content_pipeline:
  commentary: true
  tts: true
  avatar_video: false
  image_gen: false
  tts_config:
    engine: "xtts_v2"
    language: "pt-BR"
    speed: 1.0

knowledge:
  package: "futebol_brasileiro.json"
  embedding_dim: 384
  categories:
    - "futebol"
    - "basketball"
    - "esportes"

platforms:
  telegram:
    enabled: true
    content_types: ["text", "audio"]
  twitter:
    enabled: false
    content_types: ["text"]

scheduling:
  match_days: true
  pre_match_hours: 3
  post_match_hours: 6
  daily_content: true
  daily_content_times: ["08:00", "12:00", "19:00"]

quotas:
  max_posts_per_day: 50
  max_video_per_day: 0
  max_api_calls_per_hour: 200

match_rules:
  competitions: ["BSA", "PL", "CL", "NBA"]
  teams: []
  events: ["goal", "status_change", "game_end"]

metadata:
  created_by: "atti-sports-influencer"
  template_version: "1.0"
